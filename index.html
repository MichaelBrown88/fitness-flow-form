<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Keep title + description in sync with SEO_INDEXABLE_BY_PATH[ROUTES.HOME] in src/constants/seo.ts -->
    <title>Fitness assessment software for coaches &amp; gyms | One Assess</title>
    <meta
      name="description"
      content="AI posture analysis, professional client reports, and progress tracking for personal trainers and gyms. Try free, see the demo, or start a gym trial."
    />
    <meta name="author" content="One Assess" />

    <!-- Favicon & PWA — `<link rel="manifest">` is injected by vite-plugin-pwa (see `productBranding.vitePwaCoachManifest`) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <!-- DM Sans — primary typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <!-- Must match src/constants/themeChrome.ts (same as --background light/dark in index.css) -->
    <meta name="theme-color" content="#faf8f5" />
    <!-- FOUC: sync key with STORAGE_KEYS.COLOR_MODE in src/constants/storageKeys.ts -->
    <script>
      (function () {
        var light = '#faf8f5';
        var dark = '#0f0d0b';
        try {
          if (localStorage.getItem('oneassess-color-mode') === 'dark') {
            document.documentElement.classList.add('dark');
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', dark);
          }
        } catch (e) {}
      })();
    </script>

    <meta property="og:title" content="Fitness assessment software for coaches &amp; gyms | One Assess" />
    <meta
      property="og:description"
      content="AI posture analysis, professional client reports, and progress tracking for personal trainers and gyms. Try free, see the demo, or start a gym trial."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://one-assess.com/" />
    <meta property="og:image" content="https://one-assess.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="One Assess" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@oneassess" />
    <meta name="twitter:title" content="Fitness assessment software for coaches &amp; gyms | One Assess" />
    <meta name="twitter:description" content="AI posture analysis, professional client reports, and progress tracking for personal trainers and gyms. Try free or see the demo." />
    <meta name="twitter:image" content="https://one-assess.com/og-image.png" />
    
    <!-- Structured data baseline; per-route title/description set by the app (react-helmet-async). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "One Assess",
          "url": "https://one-assess.com/",
          "logo": "https://one-assess.com/favicon.svg",
          "description": "Fitness assessment software for coaches and gyms: AI posture analysis, client reports, and retention tools."
        },
        {
          "@type": "SoftwareApplication",
          "name": "One Assess",
          "applicationCategory": "HealthApplication",
          "operatingSystem": "Web",
          "description": "AI-powered fitness assessment platform for coaches and gyms: movement and posture insights, automated reporting, and client progress tracking.",
          "url": "https://one-assess.com/",
          "publisher": { "@type": "Organization", "name": "One Assess" }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
