<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #b91c1c;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clear Authentication</h1>
        <p>This will sign you out and clear all cached authentication data.</p>
        <button onclick="clearAuth()">Clear Auth & Sign Out</button>
        <div id="status" class="status"></div>
    </div>

    <script type="module">
        async function clearAuth() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Clearing authentication...';
            statusEl.className = 'status';

            try {
                // Import Firebase auth
                const { signOut, getAuth } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
                
                // Try to sign out if there's an auth instance
                try {
                    const auth = getAuth();
                    if (auth.currentUser) {
                        await signOut(auth);
                    }
                } catch (e) {
                    console.log('No active auth session to sign out');
                }

                // Clear all browser storage
                localStorage.clear();
                sessionStorage.clear();

                // Clear IndexedDB
                if ('indexedDB' in window) {
                    const databases = await indexedDB.databases();
                    for (const db of databases) {
                        if (db.name && (db.name.includes('firebase') || db.name.includes('firestore'))) {
                            indexedDB.deleteDatabase(db.name);
                        }
                    }
                }

                statusEl.textContent = '✓ Authentication cleared! Redirecting...';
                statusEl.className = 'status success';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                // If Firebase import fails, just clear storage
                localStorage.clear();
                sessionStorage.clear();
                
                statusEl.textContent = '✓ Local storage cleared! Redirecting...';
                statusEl.className = 'status success';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }
        }

        window.clearAuth = clearAuth;
    </script>
</body>
</html>
